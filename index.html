<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MangaHive — Read & Watch</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#0a0a0f; --surface:#13131a; --card:#1c1c26;
    --accent:#ff4e6a; --accent2:#ffd166; --text:#f0f0f8;
    --muted:#6b6b8a; --success:#4ade80; --radius:14px;
    --video:#9333ea; --video2:#c084fc;
    --font-title:'Bebas Neue',sans-serif; --font-body:'Nunito',sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; overflow-x:hidden; }

  /* SCREENS */
  .screen { display:none; min-height:100vh; animation: fadeIn 0.2s ease; }
  .screen.active { display:block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

  /* NAV */
  .bottom-nav {
    position:fixed; bottom:0; left:0; right:0;
    background:var(--surface); border-top:1px solid #ffffff0c;
    display:flex; justify-content:space-around;
    padding:10px 0 20px; z-index:100;
    backdrop-filter:blur(20px);
  }
  .nav-btn {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    background:none; border:none; color:var(--muted); cursor:pointer;
    font-family:var(--font-body); font-size:10px; font-weight:800;
    padding:4px 16px; transition:color 0.2s;
  }
  .nav-btn.active { color:var(--accent); }
  .nav-btn svg { width:22px; height:22px; }

  /* TOP BAR */
  .top-bar {
    display:flex; align-items:center; justify-content:space-between;
    padding:50px 20px 16px;
  }
  .app-logo { font-family:var(--font-title); font-size:30px; letter-spacing:2px; }
  .app-logo span { color:var(--accent); }
  .user-avatar {
    width:36px; height:36px; border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-size:16px; cursor:pointer; font-weight:800; color:#fff;
    font-family:var(--font-body);
  }

  /* CONTENT TYPE TOGGLE */
  .content-toggle {
    display:flex; background:var(--card); border-radius:30px; padding:4px;
    margin:0 20px 16px; border:1px solid #ffffff08;
  }
  .toggle-btn {
    flex:1; padding:10px 16px; border:none; background:transparent;
    color:var(--muted); font-family:var(--font-body); font-size:13px;
    font-weight:800; border-radius:26px; cursor:pointer; transition:all 0.2s;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .toggle-btn.active { background:var(--accent); color:#fff; }
  .toggle-btn.video.active { background:var(--video); }
  .toggle-btn svg { width:16px; height:16px; }

  /* HERO BANNER */
  .hero-scroll { display:flex; gap:14px; overflow-x:auto; padding:0 20px 16px; scrollbar-width:none; }
  .hero-scroll::-webkit-scrollbar { display:none; }
  .hero-card {
    min-width:200px; height:270px; border-radius:var(--radius);
    position:relative; overflow:hidden; cursor:pointer; flex-shrink:0;
    transition:transform 0.2s;
  }
  .hero-card:active { transform:scale(0.97); }
  .hero-card img { width:100%; height:100%; object-fit:cover; }
  .hero-card video { width:100%; height:100%; object-fit:cover; }
  .hero-card .overlay {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(to top,#000000f0,transparent 70%);
    padding:14px 12px 12px;
  }
  .hero-card .h-title { font-size:15px; font-weight:900; line-height:1.2; }
  .hero-card .h-genre { font-size:10px; color:var(--accent); font-weight:800; margin-top:3px; }
  .hot-badge {
    position:absolute; top:10px; right:10px;
    background:var(--accent); color:#fff;
    font-size:9px; font-weight:800; padding:3px 8px; border-radius:20px;
  }
  .new-badge {
    position:absolute; top:10px; left:10px;
    background:var(--accent2); color:#000;
    font-size:9px; font-weight:800; padding:3px 8px; border-radius:20px;
  }
  .video-badge {
    position:absolute; top:10px; left:10px;
    background:var(--video); color:#fff;
    font-size:9px; font-weight:800; padding:3px 8px; border-radius:20px;
    display:flex; align-items:center; gap:4px;
  }
  .video-badge svg { width:10px; height:10px; }

  /* SECTION */
  .sec-head { display:flex; justify-content:space-between; align-items:center; padding:16px 20px 12px; }
  .sec-title { font-family:var(--font-title); font-size:22px; letter-spacing:1px; }
  .see-all { color:var(--accent); font-size:12px; font-weight:800; cursor:pointer; }

  /* GENRE PILLS */
  .pills { display:flex; gap:8px; overflow-x:auto; padding:0 20px 16px; scrollbar-width:none; }
  .pills::-webkit-scrollbar { display:none; }
  .pill {
    padding:7px 18px; border-radius:30px; border:1.5px solid #ffffff15;
    background:var(--card); color:var(--muted);
    font-size:12px; font-weight:800; white-space:nowrap; cursor:pointer;
    transition:all 0.2s;
  }
  .pill.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* GRID */
  .story-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:0 20px; }
  .story-card {
    background:var(--card); border-radius:var(--radius);
    overflow:hidden; cursor:pointer; transition:transform 0.2s;
    border:1px solid #ffffff06; position:relative;
  }
  .story-card:active { transform:scale(0.97); }
  .story-card img { width:100%; height:165px; object-fit:cover; display:block; }
  .story-info { padding:10px; }
  .story-title { font-size:13px; font-weight:800; line-height:1.3; }
  .story-meta { font-size:10px; color:var(--muted); margin-top:3px; }
  .chips { display:flex; gap:5px; margin-top:6px; flex-wrap:wrap; }
  .chip { font-size:9px; font-weight:800; padding:2px 7px; border-radius:20px; background:#ffffff10; color:var(--muted); }
  .chip.hot { background:#ff4e6a20; color:var(--accent); }
  .chip.free { background:#4ade8020; color:var(--success); }
  .chip.video { background:#9333ea20; color:var(--video2); }
  .type-indicator {
    position:absolute; top:8px; right:8px;
    width:28px; height:28px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:12px;
  }
  .type-indicator.manga { background:#ff4e6a33; }
  .type-indicator.video { background:#9333ea33; }

  /* SHIMMER LOADING */
  .shimmer {
    background:linear-gradient(90deg,var(--card) 25%,#ffffff08 50%,var(--card) 75%);
    background-size:200% 100%; animation:shimmer 1.4s infinite;
    border-radius:var(--radius);
  }
  @keyframes shimmer { to { background-position:-200% 0; } }
  .shimmer-card { height:220px; width:100%; }
  .shimmer-text { height:14px; width:80%; margin:8px 10px 4px; border-radius:6px; }
  .shimmer-sub { height:10px; width:50%; margin:0 10px 10px; border-radius:6px; }

  /* DETAIL */
  #detail { padding-bottom:90px; }
  .detail-cover-wrap { position:relative; }
  .detail-cover-wrap img { width:100%; height:330px; object-fit:cover; display:block; }
  .detail-cover-wrap video { width:100%; height:330px; object-fit:cover; display:block; }
  .detail-cover-wrap::after {
    content:''; position:absolute; bottom:0; left:0; right:0; height:200px;
    background:linear-gradient(to top,var(--bg),transparent);
  }
  .back-btn {
    position:absolute; top:50px; left:16px; z-index:5;
    background:#00000066; border:none; color:#fff;
    width:38px; height:38px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    backdrop-filter:blur(8px);
  }
  .bm-btn {
    position:absolute; top:50px; right:16px; z-index:5;
    background:#00000066; border:none; color:#fff;
    width:38px; height:38px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    backdrop-filter:blur(8px);
  }
  .detail-body { padding:0 20px 20px; margin-top:-50px; position:relative; z-index:2; }
  .d-title { font-family:var(--font-title); font-size:38px; line-height:1; }
  .d-author { color:var(--muted); font-size:13px; margin:6px 0 14px; }
  .d-stats { display:flex; gap:24px; margin-bottom:14px; }
  .d-stat-val { font-size:17px; font-weight:900; }
  .d-stat-lbl { font-size:10px; color:var(--muted); }
  .d-genres { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
  .d-genre { background:var(--card); border:1px solid #ffffff12; color:var(--muted); font-size:11px; font-weight:700; padding:4px 13px; border-radius:20px; }
  .d-genre.video { background:#9333ea22; border-color:#9333ea44; color:var(--video2); }
  .d-synopsis { font-size:13px; line-height:1.75; color:#b8b8d0; margin-bottom:22px; }
  .read-btn {
    width:100%; padding:17px; background:var(--accent); color:#fff;
    border:none; border-radius:var(--radius);
    font-family:var(--font-body); font-size:16px; font-weight:900;
    cursor:pointer; box-shadow:0 6px 24px #ff4e6a33; margin-bottom:24px;
  }
  .read-btn.video { background:var(--video); box-shadow:0 6px 24px #9333ea33; }
  .eps-title { font-family:var(--font-title); font-size:22px; margin-bottom:12px; }
  .ep-list { display:flex; flex-direction:column; gap:3px; }
  .ep-item {
    background:var(--card); padding:14px 16px; border-radius:10px;
    display:flex; align-items:center; justify-content:space-between;
    cursor:pointer; transition:background 0.15s;
  }
  .ep-item:active { background:#ffffff0c; }
  .ep-item.video { border-left:3px solid var(--video); }
  .ep-title-text { font-size:13px; font-weight:700; }
  .ep-date { font-size:11px; color:var(--muted); margin-top:3px; }
  .ep-free { color:var(--success); font-size:11px; font-weight:800; }
  .ep-lock { font-size:17px; }
  .ep-coins { font-size:11px; color:var(--accent2); font-weight:800; }
  .ep-duration { font-size:10px; color:var(--video2); font-weight:700; display:flex; align-items:center; gap:4px; }

  /* MANGA READER */
  #reader { background:#000; padding-bottom:80px; }
  .reader-bar {
    position:fixed; top:0; left:0; right:0;
    background:linear-gradient(to bottom,#000000cc,transparent);
    padding:50px 16px 20px;
    display:flex; align-items:center; gap:14px; z-index:20;
  }
  .reader-back {
    width:34px; height:34px; border-radius:50%;
    background:#ffffff15; border:none; color:#fff;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .reader-info { flex:1; }
  .r-title { font-size:14px; font-weight:800; }
  .r-ep { font-size:11px; color:var(--muted); }
  .r-coins { font-size:12px; font-weight:800; color:var(--accent2); }
  .manga-page { width:100%; display:block; }
  .chapter-end {
    padding:40px 20px; text-align:center;
    background:linear-gradient(to bottom,#000,var(--bg));
  }
  .chapter-end h3 { font-family:var(--font-title); font-size:24px; color:var(--muted); margin-bottom:10px; }
  .chapter-end p { font-size:13px; color:var(--muted); margin-bottom:16px; }
  .next-btn {
    padding:14px 28px; background:var(--accent); color:#fff; border:none;
    border-radius:var(--radius); font-size:14px; font-weight:800; cursor:pointer;
    font-family:var(--font-body);
  }
  .unlock-card {
    background:var(--card); border-radius:var(--radius); padding:20px;
    border:1px solid #ffffff10; max-width:320px; margin:0 auto;
  }
  .unlock-card h4 { font-size:16px; margin-bottom:8px; }
  .unlock-card p { font-size:12px; color:var(--muted); margin-bottom:14px; }
  .coins-btn {
    width:100%; padding:13px; background:var(--accent2); color:#000;
    border:none; border-radius:10px; font-weight:900; cursor:pointer;
    font-family:var(--font-body); font-size:14px;
  }

  /* VIDEO PLAYER */
  #videoPlayer { background:#000; min-height:100vh; }
  .video-player-wrap {
    position:relative; width:100%; aspect-ratio:9/16;
    max-height:70vh; background:#000;
  }
  .video-player-wrap video {
    width:100%; height:100%; object-fit:contain;
  }
  .video-bar {
    position:absolute; top:0; left:0; right:0;
    background:linear-gradient(to bottom,#000000cc,transparent);
    padding:50px 16px 30px;
    display:flex; align-items:center; gap:14px; z-index:20;
  }
  .video-controls {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(to top,#000000ee,transparent);
    padding:20px 16px 16px;
  }
  .video-progress {
    width:100%; height:4px; background:#ffffff30; border-radius:2px;
    margin-bottom:12px; cursor:pointer; position:relative;
  }
  .video-progress-fill {
    height:100%; background:var(--video); border-radius:2px;
    transition:width 0.1s;
  }
  .video-time { font-size:11px; color:#fff; font-weight:700; }
  .video-bottom-info {
    padding:20px;
    background:linear-gradient(to bottom,#000,var(--bg));
  }
  .video-ep-title { font-family:var(--font-title); font-size:22px; margin-bottom:4px; }
  .video-ep-series { font-size:12px; color:var(--muted); margin-bottom:16px; }
  .video-nav-btns { display:flex; gap:10px; }
  .video-nav-btn {
    flex:1; padding:14px; border-radius:10px;
    font-family:var(--font-body); font-size:13px; font-weight:800;
    cursor:pointer; border:none;
  }
  .video-nav-btn.prev { background:var(--card); color:var(--text); }
  .video-nav-btn.next { background:var(--video); color:#fff; }
  .video-nav-btn:disabled { opacity:0.4; cursor:not-allowed; }

  /* SEARCH */
  #search { padding-bottom:90px; }
  .search-wrap { padding:50px 20px 16px; }
  .search-box {
    width:100%; background:var(--card); border:1.5px solid #ffffff10;
    border-radius:var(--radius); padding:14px 18px;
    color:var(--text); font-family:var(--font-body); font-size:15px;
    font-weight:600; outline:none;
  }
  .search-box:focus { border-color:var(--accent); }
  .search-box::placeholder { color:var(--muted); }

  /* LIBRARY */
  #library { padding:50px 0 90px; }
  .lib-head { padding:0 20px 20px; }
  .lib-title { font-family:var(--font-title); font-size:32px; }
  .empty-state { text-align:center; padding:60px 30px; color:var(--muted); }
  .empty-icon { font-size:48px; margin-bottom:16px; }

  /* PROFILE */
  #profile { padding:50px 20px 90px; }
  .prof-card {
    background:var(--card); border-radius:var(--radius); padding:24px;
    text-align:center; border:1px solid #ffffff08; margin-bottom:20px;
  }
  .prof-avatar {
    width:80px; height:80px; border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-size:32px; font-weight:900; color:#fff; margin:0 auto 14px;
    font-family:var(--font-body);
  }
  .prof-name { font-size:20px; font-weight:900; }
  .prof-sub { font-size:12px; color:var(--muted); margin-top:4px; }
  .prof-coins {
    display:inline-flex; align-items:center; gap:6px;
    background:#ffd16620; color:var(--accent2);
    padding:8px 18px; border-radius:30px;
    font-weight:800; font-size:14px; margin-top:14px;
  }
  .prof-menu { display:flex; flex-direction:column; gap:8px; }
  .prof-item {
    background:var(--card); padding:16px 18px; border-radius:12px;
    display:flex; align-items:center; justify-content:space-between;
    cursor:pointer; border:1px solid #ffffff08;
  }
  .prof-item:active { background:#ffffff08; }
  .pi-left { display:flex; align-items:center; gap:12px; }
  .pi-icon { font-size:18px; }
  .pi-text { font-size:14px; font-weight:700; }
  .pi-arrow { color:var(--muted); }

  /* AUTH GATE */
  .auth-gate {
    position:fixed; inset:0; background:#000000ee; z-index:200;
    display:none; align-items:flex-end; justify-content:center;
    animation: fadeIn 0.2s ease;
  }
  .auth-gate.show { display:flex; }
  .auth-box {
    background:var(--surface); border-radius:24px 24px 0 0;
    padding:28px 24px 40px; width:100%; max-width:420px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:none; } }
  .auth-close {
    width:40px; height:4px; background:#ffffff20; border-radius:4px;
    margin:0 auto 20px;
  }
  .auth-title { font-family:var(--font-title); font-size:28px; margin-bottom:6px; }
  .auth-sub { font-size:13px; color:var(--muted); margin-bottom:20px; }
  .auth-btn {
    width:100%; padding:16px; background:var(--accent); color:#fff;
    border:none; border-radius:var(--radius); font-size:16px; font-weight:900;
    cursor:pointer; font-family:var(--font-body);
  }

  /* TOAST */
  .toast {
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
    background:var(--card); color:var(--text); padding:12px 24px;
    border-radius:30px; font-size:13px; font-weight:700;
    box-shadow:0 8px 30px #00000080; z-index:300;
    opacity:0; transition:opacity 0.3s; pointer-events:none;
    border:1px solid #ffffff10;
  }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="top-bar">
    <div class="app-logo">MANGA<span>HIVE</span></div>
    <div class="user-avatar" id="userAvatar" onclick="goScreen('profile',document.querySelectorAll('.nav-btn')[3])">?</div>
  </div>

  <!-- Content Type Toggle -->
  <div class="content-toggle">
    <button class="toggle-btn active" id="toggleManga" onclick="setContentType('manga')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Read
    </button>
    <button class="toggle-btn video" id="toggleVideo" onclick="setContentType('video')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Watch
    </button>
  </div>

  <div class="sec-head">
    <div class="sec-title">🔥 TRENDING</div>
  </div>
  <div class="hero-scroll" id="heroScroll"></div>

  <div class="sec-head">
    <div class="sec-title">📚 ALL STORIES</div>
  </div>
  <div class="pills" id="genrePills"></div>
  <div class="story-grid" id="storyGrid"></div>
  <div style="height:90px"></div>
</div>

<!-- DETAIL -->
<div class="screen" id="detail"></div>

<!-- MANGA READER -->
<div class="screen" id="reader"></div>

<!-- VIDEO PLAYER -->
<div class="screen" id="videoPlayer"></div>

<!-- SEARCH -->
<div class="screen" id="search">
  <div class="search-wrap">
    <input type="text" class="search-box" placeholder="🔍 Search manga or drama..." oninput="filterSearch(this.value)">
  </div>
  <div class="story-grid" id="searchGrid" style="padding:0 20px;"></div>
</div>

<!-- LIBRARY -->
<div class="screen" id="library">
  <div class="lib-head"><div class="lib-title">📖 MY LIBRARY</div></div>
  <div id="libraryContent" style="padding:0 20px;"></div>
</div>

<!-- PROFILE -->
<div class="screen" id="profile">
  <div class="prof-card">
    <div class="prof-avatar" id="profAvatar">?</div>
    <div class="prof-name" id="profName">Guest</div>
    <div class="prof-sub" id="profSub">Free Member</div>
    <div class="prof-coins">🪙 <span id="coinDisplay">50</span> coins</div>
  </div>
  <div class="prof-menu">
    <div class="prof-item" onclick="window.location='auth.html'">
      <div class="pi-left"><span class="pi-icon">🔐</span><span class="pi-text">Login / Sign Up</span></div>
      <span class="pi-arrow">→</span>
    </div>
    <div class="prof-item" onclick="window.location='admin.html'">
      <div class="pi-left"><span class="pi-icon">⚡</span><span class="pi-text">Admin Panel</span></div>
      <span class="pi-arrow">→</span>
    </div>
    <div class="prof-item" onclick="window.location='mangahive-suite.html'">
      <div class="pi-left"><span class="pi-icon">🎨</span><span class="pi-text">Manga Suite</span></div>
      <span class="pi-arrow">→</span>
    </div>
    <div class="prof-item" onclick="window.location='video-suite.html'">
      <div class="pi-left"><span class="pi-icon">🎬</span><span class="pi-text">Video Suite</span></div>
      <span class="pi-arrow">→</span>
    </div>
    <div class="prof-item" onclick="logoutUser()">
      <div class="pi-left"><span class="pi-icon">🚪</span><span class="pi-text">Logout</span></div>
      <span class="pi-arrow">→</span>
    </div>
  </div>
</div>

<!-- AUTH GATE -->
<div class="auth-gate" id="authGate">
  <div class="auth-box">
    <div class="auth-close"></div>

// ─── DETAIL ───────────────────────────────────────────────────────────────────
async function openDetail(id) {

    chapters = generateDemoChapters(s.chapters_count || 8, isVideo);
  }

  document.getElementById('detail').innerHTML = `
    <div class="detail-cover-wrap">
      ${isVideo && s.preview_url 
        ? `<video src="${s.preview_url}" autoplay muted loop playsinline></video>`

      </div>
      <div class="d-genres">
        <span class="d-genre">${s.genre}</span>

      </div>
      <p class="d-synopsis">${s.synopsis || 'No synopsis available.'}</p>
      <button class="read-btn ${isVideo ? 'video' : ''}" onclick="${isVideo ? `openVideo('${id}',1)` : `openReader('${id}',1)`}">

          <div class="ep-item ${isVideo ? 'video' : ''}" onclick="${isVideo ? `openVideo('${id}',${epNum})` : `openReader('${id}',${epNum})`}">
            <div>
              <div class="ep-title-text">Episode ${epNum}${ch.title && ch.title !== `Episode ${epNum}` ? ` — ${ch.title}` : ''}</div>
              <div class="ep-date">${fmtDate(ch.created_at)}</div>
              ${isVideo ? `<div class="ep-duration">▶ ${Math.floor(duration/60)}:${(duration%60).toString().padStart(2,'0')}</div>` : ''}

              ${isFree 
                ? '<span class="ep-free">FREE</span>' 
                : `<span class="ep-coins">🪙 ${ch.coin_cost||5}</span>`}

}

// ─── MANGA READER ─────────────────────────────────────────────────────────────
async function openReader(storyId, epNum) {
  const s = allStories.find(x => x.id == storyId);
  if (!s) return;

  let chapter = null;
  try {
    const { data } = await sb.from('chapters')
      .select('*').eq('story_id', storyId).eq('episode_number', epNum).single();
    chapter = data;
  } catch(e) {}

  const isFree = chapter ? chapter.is_free : epNum <= 3;
  const coinCost = chapter?.coin_cost || 5;

  if (!isFree && userProfile.coins < coinCost) {
    showToast('🪙 Not enough coins!');
    return;
  }
  if (!isFree) {
    userProfile.coins -= coinCost;
    document.getElementById('coinDisplay').textContent = userProfile.coins;
    if (currentUser) {
      sb.from('profiles').update({ coins: userProfile.coins }).eq('id', currentUser.id).then(()=>{});
    }
  }

  let pages = chapter?.pages || generateDemoPages(storyId, epNum);
  if(chapter?.pages) {
    pages = [...chapter.pages].sort((a, b) => {
      const getNum = url => {
        const filename = url.split('/').pop().split('.')[0];
        const match = filename.match(/(\d+)/);
        return match ? parseInt(match[1]) : 0;
      };
      return getNum(a) - getNum(b);
    });
  }
  const totalEps = s.chapters_count || 8;

  document.getElementById('reader').innerHTML = `
    <div class="reader-bar">
      <button class="reader-back" onclick="openDetail('${storyId}')">
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <div class="reader-info">
        <div class="r-title">${s.title}</div>
        <div class="r-ep">Episode ${epNum} of ${totalEps}</div>
      </div>
      <div class="r-coins">🪙 ${userProfile.coins}</div>
    </div>
    <div style="height:80px"></div>
    ${pages.map(url => `<img class="manga-page" src="${url}" loading="lazy"
      onerror="this.style.background='var(--card)';this.style.minHeight='300px'">`).join('')}
    <div class="chapter-end">
      <h3>— END OF EPISODE ${epNum} —</h3>
      <p>${s.title} continues...</p>
      ${epNum < totalEps
        ? (epNum+1 <= 3
          ? `<button class="next-btn" onclick="openReader('${storyId}',${epNum+1})">▶ Next Episode (Free)</button>`
          : `<div class="unlock-card">
              <h4>🔒 Episode ${epNum+1} is Premium</h4>
              <p>Unlock with ${coinCost} coins · You have ${userProfile.coins} coins</p>
              <button class="coins-btn" onclick="openReader('${storyId}',${epNum+1})">🪙 Unlock Episode ${epNum+1}</button>
            </div>`)
        : `<p style="color:var(--success);font-weight:800;font-size:16px">🎉 You've read all available episodes!</p>`}
    </div>
  `;
  showScreen('reader');
}

// ─── VIDEO PLAYER ─────────────────────────────────────────────────────────────
async function openVideo(storyId, epNum) {
  const s = allStories.find(x => x.id == storyId);
  if (!s) return;

  let chapter = null;
  try {
    const { data } = await sb.from('chapters')
      .select('*').eq('story_id', storyId).eq('episode_number', epNum).single();
    chapter = data;
  } catch(e) {}

  const isFree = chapter ? chapter.is_free : epNum <= 3;
  const coinCost = chapter?.coin_cost || 8;

  if (!isFree && userProfile.coins < coinCost) {
    showToast('🪙 Not enough coins!');
    return;
  }
  if (!isFree) {
    userProfile.coins -= coinCost;
    document.getElementById('coinDisplay').textContent = userProfile.coins;
    if (currentUser) {
      sb.from('profiles').update({ coins: userProfile.coins }).eq('id', currentUser.id).then(()=>{});
    }
  }

  // Video URL from chapter or demo
  const videoUrl = chapter?.video_url || s.preview_url || 'https://sample-videos.com/video321/mp4/720/big_buck_bunny_720p_1mb.mp4';
  const totalEps = s.chapters_count || 15;

  document.getElementById('videoPlayer').innerHTML = `
    <div class="video-player-wrap">
      <video id="mainVideo" src="${videoUrl}" playsinline onclick="toggleVideoPlay()"></video>
      <div class="video-bar">
        <button class="reader-back" onclick="openDetail('${storyId}')">
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </button>
        <div class="reader-info">
          <div class="r-title">${s.title}</div>
          <div class="r-ep">Episode ${epNum} of ${totalEps}</div>
        </div>
        <div class="r-coins">🪙 ${userProfile.coins}</div>
      </div>
      <div class="video-controls">
        <div class="video-progress" onclick="seekVideo(event)">
          <div class="video-progress-fill" id="videoProgress" style="width:0%"></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="video-time"><span id="currentTime">0:00</span> / <span id="totalTime">0:00</span></div>
          <button style="background:var(--video);border:none;color:#fff;padding:8px 16px;border-radius:20px;font-weight:800;font-size:11px;cursor:pointer" onclick="toggleVideoPlay()">
            <span id="playPauseBtn">▶ PLAY</span>
          </button>
        </div>
      </div>
    </div>
    <div class="video-bottom-info">
      <div class="video-ep-title">Episode ${epNum}${chapter?.title ? ` — ${chapter.title}` : ''}</div>
      <div class="video-ep-series">${s.title} · ${s.genre}</div>
      <div class="video-nav-btns">
        <button class="video-nav-btn prev" ${epNum <= 1 ? 'disabled' : ''} onclick="openVideo('${storyId}',${epNum-1})">← Previous</button>
        <button class="video-nav-btn next" ${epNum >= totalEps ? 'disabled' : ''} onclick="openVideo('${storyId}',${epNum+1})">
          ${epNum+1 <= 3 ? 'Next (Free) →' : `Unlock 🪙 ${coinCost} →`}
        </button>
      </div>
    </div>
  `;

  showScreen('videoPlayer');

  // Setup video events
  const video = document.getElementById('mainVideo');
  video.addEventListener('timeupdate', updateVideoProgress);
  video.addEventListener('loadedmetadata', () => {
    document.getElementById('totalTime').textContent = formatTime(video.duration);
  });
  video.addEventListener('ended', () => {
    if (epNum < totalEps) {
      showToast('Episode ended! Watch next?');
    }
  });
}

function toggleVideoPlay() {
  const video = document.getElementById('mainVideo');
  const btn = document.getElementById('playPauseBtn');
  if (video.paused) {
    video.play();
    btn.textContent = '⏸ PAUSE';
  } else {
    video.pause();
    btn.textContent = '▶ PLAY';
  }
}

function updateVideoProgress() {
  const video = document.getElementById('mainVideo');
  const progress = (video.currentTime / video.duration) * 100;
  document.getElementById('videoProgress').style.width = progress + '%';
  document.getElementById('currentTime').textContent = formatTime(video.currentTime);
}

function seekVideo(e) {
  const video = document.getElementById('mainVideo');
  const rect = e.currentTarget.getBoundingClientRect();
  const percent = (e.clientX - rect.left) / rect.width;
  video.currentTime = percent * video.duration;
}

function formatTime(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function filterSearch(q) {
  let filtered = allStories;
  if (q) {
    const query = q.toLowerCase();
    filtered = allStories.filter(s =>
      s.title.toLowerCase().includes(query) ||
      s.genre.toLowerCase().includes(query) ||
      (s.author||'').toLowerCase().includes(query) ||
      (s.type||'manga').toLowerCase().includes(query)
    );
  }
  renderGrid('searchGrid', filtered);
}

// ─── LIBRARY ──────────────────────────────────────────────────────────────────
function toggleBookmark(id) {
  const idx = userProfile.bookmarks.indexOf(id);
  if (idx > -1) {
    userProfile.bookmarks.splice(idx, 1);
    showToast('Removed from Library');
  } else {
    userProfile.bookmarks.push(id);
    showToast('✅ Saved to Library!');
  }
  if (currentUser) {
    sb.from('profiles').update({ bookmarks: userProfile.bookmarks }).eq('id', currentUser.id).then(()=>{});
  }
  renderLibrary();
  openDetail(id);
}

function renderLibrary() {
  const el = document.getElementById('libraryContent');
  if (!userProfile.bookmarks.length) {
    el.innerHTML='<div class="empty-state"><div class="empty-icon">📖</div><p>No bookmarks yet.<br>Start reading or watching to save here!</p></div>';
    return;
  }
  const saved = allStories.filter(s => userProfile.bookmarks.includes(s.id));
  el.innerHTML = `<div class="story-grid">${saved.map(s => {
    const isVideo = (s.type || 'manga') === 'video';
    return `
    <div class="story-card" onclick="openDetail('${s.id}')">
      <img src="${s.cover_url}" loading="lazy" onerror="this.src='https://picsum.photos/seed/${s.id}/300/420'">
      <div class="type-indicator ${isVideo ? 'video' : 'manga'}">${isVideo ? '▶' : '📖'}</div>
      <div class="story-info">
        <div class="story-title">${s.title}</div>
        <div class="story-meta">⭐ ${s.rating||'4.8'} · ${s.chapters_count||0} eps</div>
      </div>
    </div>
  `}).join('')}</div>`;
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function goScreen(id, btn) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (id==='library') renderLibrary();
  if (id==='search') renderGrid('searchGrid', allStories);
  window.scrollTo(0,0);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function closeAuthGate() {
  document.getElementById('authGate').classList.remove('show');
}

async function logoutUser() {
  try { await sb.auth.signOut(); } catch(e) {}
  currentUser = null;
  userProfile = { coins:50, bookmarks:[] };
  document.getElementById('userAvatar').textContent='?';
  document.getElementById('profName').textContent='Guest';
  document.getElementById('profSub').textContent='Free Member';
  document.getElementById('coinDisplay').textContent='50';
  showToast('Logged out');
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmtViews(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(0)+'K';
  return n;
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function generateDemoChapters(count, isVideo) {
  return Array.from({length:count},(_,i)=>({
    episode_number:i+1, 
    title:i===0?'Prologue':i===count-1?'Finale':'',
    is_free:i<3, 
    coin_cost: isVideo ? 8 : 5,
    duration: isVideo ? Math.floor(60 + Math.random() * 90) : null,
    created_at:new Date(Date.now()-(count-i)*3*24*60*60*1000).toISOString()
  }));
}

function generateDemoPages(storyId, ep) {
  return Array.from({length:8},(_,i)=>
    `https://picsum.photos/seed/${storyId}_${ep}_${i}/400/${220+i*30}`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ─── START ────────────────────────────────────────────────────────────────────
init();
</script>
