<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MangaHive Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --card:#1c1c26; --surface:#13131a;
  --accent:#ff4e6a; --accent2:#ffd166; --text:#f0f0f8;
  --muted:#6b6b8a; --success:#4ade80; --radius:14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Nunito',sans-serif; min-height:100vh; }
.gate { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; gap:20px; }
.logo { font-family:'Bebas Neue',sans-serif; font-size:44px; letter-spacing:3px; }
.logo span { color:var(--accent); }
.box { background:var(--card); border-radius:var(--radius); padding:28px; width:100%; max-width:380px; border:1px solid #ffffff08; }
.box h2 { font-size:18px; margin-bottom:20px; }
.field { margin-bottom:16px; }
.field label { display:block; font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.field input { width:100%; background:var(--surface); border:1.5px solid #ffffff10; border-radius:12px; color:var(--text); padding:14px 16px; font-family:'Nunito',sans-serif; font-size:15px; font-weight:600; outline:none; }
.field input:focus { border-color:var(--accent); }
.btn { width:100%; padding:16px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); font-family:'Nunito',sans-serif; font-size:16px; font-weight:900; cursor:pointer; }
.msg { padding:12px 16px; border-radius:10px; font-size:13px; font-weight:700; margin-bottom:16px; display:none; }
.msg.err { background:#ff4e6a18; border:1px solid #ff4e6a33; color:#ff4e6a; display:block; }
.msg.ok { background:#4ade8018; border:1px solid #4ade8033; color:#4ade80; display:block; }

/* ADMIN PANEL */
#panel { display:none; }
.header { background:var(--surface); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #ffffff0c; position:sticky; top:0; z-index:50; }
.hlogo { font-family:'Bebas Neue',sans-serif; font-size:24px; }
.hlogo span { color:var(--accent); }
.hbadge { background:#ffd16622; color:var(--accent2); font-size:11px; font-weight:800; padding:4px 12px; border-radius:20px; }
.hout { background:var(--card); border:1px solid #ffffff10; color:var(--muted); padding:8px 16px; border-radius:10px; cursor:pointer; font-family:'Nunito',sans-serif; font-size:13px; font-weight:700; }
.wrap { max-width:860px; margin:0 auto; padding:24px 20px 60px; }
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
.stat { background:var(--card); border-radius:var(--radius); padding:18px; text-align:center; border:1px solid #ffffff08; }
.snum { font-family:'Bebas Neue',sans-serif; font-size:34px; color:var(--accent); }
.slbl { font-size:11px; color:var(--muted); font-weight:800; margin-top:4px; }
.tabs { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
.tab { padding:10px 18px; border-radius:30px; border:1.5px solid #ffffff12; background:var(--card); color:var(--muted); font-family:'Nunito',sans-serif; font-size:13px; font-weight:800; cursor:pointer; }
.tab.on { background:var(--accent); color:#fff; border-color:var(--accent); }
.sec { display:none; }
.sec.on { display:block; }
.fcard { background:var(--card); border-radius:var(--radius); border:1px solid #ffffff08; padding:22px; margin-bottom:18px; }
.ftitle { font-family:'Bebas Neue',sans-serif; font-size:22px; margin-bottom:18px; padding-bottom:12px; border-bottom:1px solid #ffffff0c; }
.fg { display:grid; gap:14px; }
.fg2 { grid-template-columns:1fr 1fr; }
